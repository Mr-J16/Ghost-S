<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shhhhh</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Courier+Prime:ital,wght@0,400;0,700;1,400&family=Orbitron:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #050505;
            --text-main: #d1d5db;
            --border-color: #333333;
            --accent-muted: #1f2937;
        }

        body {
            background-color: var(--bg-color);
            font-family: 'Courier Prime', monospace;
            color: var(--text-main);
            overflow-x: hidden;
        }

        /* Efecto de ruido estático analógico */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.08'/%3E%3C/svg%3E");
            pointer-events: none;
            z-index: 50;
        }

        /* Líneas de escaneo CRT */
        body::after {
            content: " ";
            display: block;
            position: fixed;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 50;
            background-size: 100% 2px, 3px 100%;
            pointer-events: none;
        }

        .container-panel {
            background-color: #0a0a0a;
            border: 1px solid var(--border-color);
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            position: relative;
            z-index: 10;
        }

        .title-noir {
            font-family: 'Orbitron', sans-serif;
            color: #ffffff;
            letter-spacing: 4px;
            text-transform: uppercase;
            animation: flicker 4s infinite alternate;
        }

        @keyframes flicker {
            0%, 19.999%, 22%, 62.999%, 64%, 64.999%, 70%, 100% { opacity: 1; }
            20%, 21.999%, 63%, 63.999%, 65%, 69.999% { opacity: 0.4; }
        }

        .input-noir {
            background-color: #000000;
            border: 1px solid var(--border-color);
            color: #ffffff;
            transition: border-color 0.3s;
        }

        .input-noir:focus {
            outline: none;
            border-color: #6b7280;
            box-shadow: inset 0 0 10px rgba(255,255,255,0.05);
        }

        .btn-noir {
            background-color: #111111;
            border: 1px solid #444;
            color: #fff;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.2s;
        }

        .btn-noir:hover {
            background-color: #222;
            border-color: #666;
        }

        .message-bubble {
            background-color: #111;
            border-left: 2px solid #555;
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from { transform: translateX(-10px); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        .fading-out {
            opacity: 0;
            transform: scale(0.98);
            transition: all 0.5s ease-out;
        }

        /* Indicador de presencia sobrio */
        .presence-indicator {
            width: 8px; height: 8px; border-radius: 50%; display: inline-block;
        }
        .online-dot { background-color: #9ca3af; box-shadow: 0 0 5px #9ca3af; }
        .offline-dot { background-color: #374151; }
        .checking-dot { background-color: #6b7280; animation: pulse 1s infinite; }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        /* Pantalla de privacidad */
        #privacy-shield {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background-color: #000; z-index: 100;
            display: flex; align-items: center; justify-content: center;
            color: #444; font-size: 2rem;
            transition: opacity 0.3s; opacity: 0; pointer-events: none;
        }
        #privacy-shield.active {
            opacity: 1; pointer-events: all;
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen">

    <div id="privacy-shield">SISTEMA BLOQUEADO</div>

    <div class="w-full max-w-md mx-auto rounded-none p-6 md:p-8 space-y-6 container-panel">
        <div id="status-message" class="bg-gray-900 border border-gray-700 text-gray-400 p-2 text-center text-xs tracking-widest uppercase hidden">
            Estableciendo conexión segura...
        </div>
        
        <div class="text-center mt-2 border-b border-gray-800 pb-6">
            <h1 class="text-3xl font-bold title-noir">GHOST PROJECT</h1>
            <p class="text-gray-500 mt-2 text-xs uppercase tracking-widest">Protocolo de Cero Rastros</p>
        </div>

        <div class="p-4 bg-black border border-gray-800 text-center relative">
            <p class="text-xs text-gray-600 mb-2 uppercase tracking-wide">Identificador Local:</p>
            <div id="loading-spinner" class="animate-pulse text-gray-500 text-sm">Generando...</div>
            <p id="userId" class="font-mono text-lg text-gray-300 break-all select-all cursor-pointer hidden hover:text-white transition-colors"></p>
        </div>

        <form id="sendMessageForm" class="space-y-5">
            <div class="relative">
                <label class="block text-xs font-bold text-gray-500 uppercase tracking-wide mb-1">Enlace Objetivo</label>
                <div class="relative flex items-center">
                    <span id="presence-indicator-container" class="absolute left-3 hidden">
                        <span id="presence-indicator" class="presence-indicator checking-dot"></span>
                    </span>
                    <input type="text" id="recipientId" required placeholder="ID del receptor..."
                        class="w-full input-noir px-3 pl-8 py-3 text-sm placeholder-gray-700">
                </div>
            </div>
            
            <div>
                <label class="block text-xs font-bold text-gray-500 uppercase tracking-wide mb-1">Carga Útil</label>
                <textarea id="messageText" required rows="3" placeholder="Mensaje..."
                            class="w-full input-noir px-3 py-3 text-sm placeholder-gray-700 resize-none"></textarea>
            </div>
            
            <button type="submit" class="w-full btn-noir font-bold py-3 px-4 text-xs">
                Transmitir
            </button>
        </form>

        <div class="pt-2">
            <h2 class="text-xs font-bold uppercase tracking-widest text-gray-500 mb-3 border-b border-gray-800 pb-2">Terminal de Recepción</h2>
            <div id="messagesContainer" class="space-y-3 h-40 overflow-y-auto pr-2 scrollbar-hide">
                <p id="no-messages" class="text-gray-700 text-xs text-center py-4 uppercase">Silencio en la red.</p>
            </div>
        </div>
    </div>
    
    <div id="toast-notification" class="fixed bottom-5 left-1/2 transform -translate-x-1/2 bg-gray-900 border border-gray-700 text-gray-300 text-xs uppercase tracking-widest py-2 px-6 shadow-2xl hidden">
        <p></p>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, query, where, onSnapshot, doc, deleteDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { getDatabase, ref, set, onValue, onDisconnect } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAqsD-wMWesTqfvh0TK_5a5IZw0JJldS34",
            authDomain: "mensajes-297b5.firebaseapp.com",
            projectId: "mensajes-297b5",
            storageBucket: "mensajes-297b5.firebasestorage.app",
            messagingSenderId: "557469481203",
            appId: "1:557469481203:web:c6eeb657bd5e3aaf6adf86",
            measurementId: "G-J8Z4SX2KHB"
        };

        // Clave de encriptación estática para la demo (Idealmente usar intercambio de llaves)
        const ENCRYPTION_KEY = "PROTOCOL_GHOST_2026"; 

        const appId = "mensajes-297b5";
        let app, auth, db, rtdb, currentUserId;
        const DOM = {
            userId: document.getElementById('userId'),
            spinner: document.getElementById('loading-spinner'),
            form: document.getElementById('sendMessageForm'),
            recipient: document.getElementById('recipientId'),
            text: document.getElementById('messageText'),
            messages: document.getElementById('messagesContainer'),
            noMsg: document.getElementById('no-messages'),
            toast: document.getElementById('toast-notification'),
            status: document.getElementById('status-message'),
            presenceInd: document.getElementById('presence-indicator'),
            presenceContainer: document.getElementById('presence-indicator-container'),
            shield: document.getElementById('privacy-shield')
        };

        let presenceListener = null;
        let debounceTimer = null;

        async function initialize() {
            try {
                DOM.status.classList.remove('hidden');
                app = initializeApp(firebaseConfig);
                auth = getAuth(app);
                db = getFirestore(app);
                rtdb = getDatabase(app);

                onAuthStateChanged(auth, async (user) => {
                    if (user) {
                        currentUserId = user.uid;
                        DOM.userId.textContent = currentUserId;
                        DOM.spinner.classList.add('hidden');
                        DOM.userId.classList.remove('hidden');
                        
                        listenForMessages();
                        setupPresence();
                        DOM.status.classList.add('hidden');
                    } else {
                        await signInAnonymously(auth);
                    }
                });
            } catch (error) {
                console.error("Fallo de sistema:", error);
                DOM.status.textContent = 'Error crítico de conexión.';
            }
        }

        function setupPresence() {
            const userRef = ref(rtdb, 'presence/' + currentUserId);
            onDisconnect(userRef).set(null);
            setInterval(() => set(userRef, { last_online: Date.now() }), 30000);
        }

        function checkRecipient(id) {
            if (presenceListener) presenceListener();
            DOM.presenceContainer.classList.remove('hidden');
            DOM.presenceInd.className = 'presence-indicator checking-dot';
            
            presenceListener = onValue(ref(rtdb, 'presence/' + id), (snapshot) => {
                const data = snapshot.val();
                const isOnline = data && (Date.now() - data.last_online) < 120000;
                DOM.presenceInd.className = `presence-indicator ${isOnline ? 'online-dot' : 'offline-dot'}`;
            });
        }

        function showToast(msg) {
            DOM.toast.querySelector('p').textContent = msg;
            DOM.toast.classList.remove('hidden');
            setTimeout(() => DOM.toast.classList.add('hidden'), 2000);
        }

        // --- Lógica de Encriptación y Transmisión ---
        DOM.form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const recipientId = DOM.recipient.value.trim();
            const text = DOM.text.value.trim();
            if (!recipientId || !text) return;

            // Encriptación AES antes de enviar a Firestore
            const encryptedText = CryptoJS.AES.encrypt(text, ENCRYPTION_KEY).toString();

            try {
                await addDoc(collection(db, `artifacts/${appId}/public/data/messages`), {
                    senderId: currentUserId,
                    recipientId: recipientId,
                    text: encryptedText, // Se guarda el texto cifrado
                    timestamp: new Date(),
                });
                showToast("Transmisión Segura Enviada");
                DOM.text.value = '';
            } catch (error) {
                showToast("Fallo de Transmisión");
            }
        });

        function listenForMessages() {
            const q = query(collection(db, `artifacts/${appId}/public/data/messages`), where("recipientId", "==", currentUserId));
            onSnapshot(q, (snapshot) => {
                snapshot.docChanges().forEach((change) => {
                    if (change.type === "added") displayMessage(change.doc.data(), change.doc.id);
                });
            });
        }

        function displayMessage(data, docId) {
            DOM.noMsg.style.display = 'none';
            
            // Desencriptar el mensaje recibido
            let decryptedText = "[Datos Corruptos]";
            try {
                const bytes = CryptoJS.AES.decrypt(data.text, ENCRYPTION_KEY);
                decryptedText = bytes.toString(CryptoJS.enc.Utf8) || "[Error de Desencriptación]";
            } catch(e) {}

            const div = document.createElement('div');
            div.className = 'message-bubble p-3 text-xs';
            div.innerHTML = `<p class="text-gray-500 mb-1 border-b border-gray-800 pb-1 font-bold">SRC: ${data.senderId.slice(0,8)}...</p>
                             <p class="text-gray-300">${decryptedText}</p>`;
            
            DOM.messages.appendChild(div);
            DOM.messages.scrollTop = DOM.messages.scrollHeight;

            // Auto-destrucción
            setTimeout(() => {
                div.classList.add('fading-out');
                setTimeout(() => div.remove(), 500);
            }, 60000); // 1 minuto
            setTimeout(() => deleteDoc(doc(db, `artifacts/${appId}/public/data/messages`, docId)), 61000);
        }

        // --- Eventos de Interfaz y Modo Paranoico ---
        DOM.userId.onclick = () => {
            navigator.clipboard.writeText(currentUserId);
            showToast('ID Copiado');
        };

        DOM.recipient.addEventListener('keyup', (e) => {
            clearTimeout(debounceTimer);
            const val = e.target.value.trim();
            if(!val) return DOM.presenceContainer.classList.add('hidden');
            debounceTimer = setTimeout(() => checkRecipient(val), 800);
        });

        // Anti-Capturas y Modo Paranoico (blur = oculta pantalla)
        window.addEventListener('blur', () => DOM.shield.classList.add('active'));
        window.addEventListener('focus', () => DOM.shield.classList.remove('active'));
        
        window.addEventListener('keyup', (e) => {
            if (e.key === 'PrintScreen' || (e.ctrlKey && e.key === 'p')) {
                DOM.messages.innerHTML = '';
                showToast("Protocolo de Purga Activado");
            }
        });

        window.onload = initialize;
    </script>
</body>
</html>
